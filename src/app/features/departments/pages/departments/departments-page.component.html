<main class="departments-page">
  <header class="page-hero">
    <div class="hero-copy">
      <p class="hero-kicker">STUDENT INFORMATION SYSTEM</p>
      <h1 class="hero-title">{{ pageHeaderTitle() }}</h1>
      <p class="hero-subtitle">{{ pageHeaderDescription() }}</p>
    </div>

    <div class="hero-tabs" role="tablist" aria-label="Directory view switcher">
      <button
        class="hero-tab"
        [class.active]="activeView() === 'departments'"
        (click)="showDepartments()"
      >
        Phòng ban
      </button>

      <button
        class="hero-tab"
        [class.active]="activeView() === 'faculties'"
        (click)="showFaculties()"
      >
        Khoa
      </button>
    </div>
  </header>

  <section class="content-panel">
    @if (activeView() === "departments") {
      <app-department-list [departments]="departments()"></app-department-list>
    }

    @if (activeView() === "faculties") {
      <div class="faculty-panel-shell">
        <div class="faculty-panel-header">
          <div>
            <p class="faculty-panel-kicker">KHOA CÔNG NGHỆ THÔNG TIN</p>
            <h2 class="faculty-panel-title">{{ pageHeaderDescription() }}</h2>
          </div>

          <div class="faculty-chip-row">
            @for (opt of facultyMenuOptions; track opt.key) {
              <button
                class="faculty-chip"
                [class.active]="selectedFacultyPageKey() === opt.key"
                (click)="showFaculties(opt.key)"
              >
                {{ opt.label }}
              </button>
            }
          </div>
        </div>

        <app-faculty-detail
          [selectedPageKey]="selectedFacultyPageKey()"
        ></app-faculty-detail>
      </div>
    }
  </section>
</main>
